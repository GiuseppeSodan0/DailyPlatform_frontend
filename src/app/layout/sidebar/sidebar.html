<aside
  class="fixed inset-0 z-30 bg-white border-r border-gray-200 transform transition-transform duration-200 flex flex-col
         lg:top-0 lg:left-0 lg:right-auto lg:bottom-auto lg:h-full lg:w-64 lg:translate-x-0"
  [class.translate-x-0]="open"
  [class.-translate-x-full]="!open"
>
  <div class="h-16 flex items-center px-6 border-b border-gray-200">
    <img src="/media/logo.png" alt="Logo" class="w-7 h-7 mr-2">
    <span class="text-lg font-bold text-gray-800">Daily Platform</span>
    <button
      type="button"
      class="lg:hidden ml-auto p-1 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500"
      (click)="close.emit()"
      aria-label="Close sidebar"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
  </div>

  <nav class="flex-1 py-4 space-y-1 px-3">
    @for (item of visibleItems(); track item.label) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-blue-50 text-blue-700"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors"
        (click)="onNavClick()"
      >
        <span class="w-5 h-5 flex-shrink-0">@switch (item.icon) {
          @case ('dashboard') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
              <rect x="3" y="3" width="7" height="9" rx="1"/>
              <rect x="14" y="3" width="7" height="5" rx="1"/>
              <rect x="14" y="12" width="7" height="9" rx="1"/>
              <rect x="3" y="16" width="7" height="5" rx="1"/>
            </svg>
          }
          @case ('users') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          }
          @case ('roles') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          }
          @case ('companies') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
              <rect x="2" y="3" width="20" height="19" rx="2"/>
              <path d="M12 7v4"/>
              <path d="M10 9h4"/>
              <path d="M2 19l20-3"/>
            </svg>
          }
          @case ('permissions') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          }
        }</span>
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="p-3 border-t border-gray-200 space-y-2">
    <button
      (click)="logout()"
      class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:bg-red-50 hover:text-red-600 transition-colors"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</aside>

<header class="bg-white border-b border-gray-200 px-4 lg:px-6 h-16 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <button (click)="menuToggle.emit()" class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <h1 class="text-lg font-semibold text-gray-800 lg:hidden">Daily Platform</h1>
  </div>
  @if (auth.user(); as user) {
    <div class="profile-menu-container relative">
      <button (click)="toggleProfileMenu(); $event.stopPropagation()" class="flex items-center gap-3 text-sm text-gray-700 hover:bg-gray-50 rounded-lg p-1.5 transition-colors">
        <span class="hidden sm:block font-medium">{{ user.name }} {{ user.surname }}</span>
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-medium overflow-hidden"
          [class.bg-blue-600]="!user.avatar">
          @if (user.avatar) {
            <img [src]="user.avatar" class="w-full h-full object-cover" />
          } @else {
            <span>{{ user.name.charAt(0) }}{{ user.surname.charAt(0) }}</span>
          }
        </div>
      </button>
      @if (showProfileMenu()) {
        <div class="absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg border border-gray-100 py-1 z-50"
          (click)="$event.stopPropagation()">
          <div class="px-4 py-3 border-b border-gray-100">
            <p class="text-sm font-medium text-gray-900">{{ user.name }} {{ user.surname }}</p>
            <p class="text-xs text-gray-500 mt-0.5">{{ user.email }}</p>
          </div>
          <a routerLink="/profile" (click)="showProfileMenu.set(false)"
            class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Profilo
          </a>
          <button (click)="auth.logout(); showProfileMenu.set(false)"
            class="flex items-center gap-3 w-full px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      }
    </div>
  }
</header>

<app-layout>
  <div class="flex items-center gap-3">
    <button (click)="goBack()"
      class="inline-flex items-center gap-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm font-medium rounded-lg px-4 py-2.5 transition-colors">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Torna alla lista
    </button>
  </div>

  @if (loading()) {
    <div class="mt-6">
      <div class="space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          @for (_ of [].constructor(4); track _) {
            <div>
              <div class="h-3 bg-gray-100 rounded animate-pulse w-16 mb-2"></div>
              <div class="h-10 bg-gray-100 rounded-lg animate-pulse w-full"></div>
            </div>
          }
        </div>
        <div class="h-3 bg-gray-100 rounded animate-pulse w-12 mb-2"></div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
          @for (_ of [].constructor(3); track _) {
            <div class="h-12 bg-gray-100 rounded-lg animate-pulse"></div>
          }
        </div>
      </div>
    </div>
  }

  @if (notFound()) {
    <div class="mt-16 text-center">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-16 h-16 mx-auto text-gray-300 mb-4">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <h3 class="text-lg font-semibold text-gray-700 mb-1">Utente non trovato</h3>
      <p class="text-sm text-gray-400 mb-6">L'utente richiesto non esiste o è stato eliminato.</p>
      <button (click)="goBack()"
        class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
        Torna alla lista utenti
      </button>
    </div>
  }

  @if (error(); as errMsg) {
    <div class="mt-16 text-center">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-16 h-16 mx-auto text-red-300 mb-4">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <h3 class="text-lg font-semibold text-gray-700 mb-1">Errore di caricamento</h3>
      <p class="text-sm text-red-500 mb-6">{{ errMsg }}</p>
      <button (click)="ngOnInit()"
        class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
        Riprova
      </button>
    </div>
  }

  @if (user(); as u) {
    <div class="mt-6">
      <app-user-form mode="edit" [user]="u" (saved)="onSaved()" (cancelled)="onCancelled()" />
    </div>
  }

  <app-user-identifiers-sidebar [user]="user()" />
</app-layout>

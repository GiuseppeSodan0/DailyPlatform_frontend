<app-layout>
  <div class="flex items-center justify-between">
    <h2 class="text-2xl font-semibold text-gray-800">Dashboard</h2>
  </div>

  <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <p class="text-sm font-medium text-gray-500">Utenti</p>
      <p class="text-3xl font-bold text-gray-900 mt-1">{{ userCount() }}</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <p class="text-sm font-medium text-gray-500">Aziende</p>
      <p class="text-3xl font-bold text-gray-900 mt-1">{{ companyCount() }}</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <p class="text-sm font-medium text-gray-500">Ruoli</p>
      <p class="text-3xl font-bold text-gray-900 mt-1">{{ roleCount() }}</p>
    </div>
  </div>

  <div class="mt-12 flex items-center justify-center">
    <div class="text-center">
      <h3 class="text-3xl font-semibold text-gray-800">buongiorno daily</h3>
      <p class="text-gray-400 mt-2 text-sm">Benvenuto nella tua piattaforma</p>
    </div>
  </div>
</app-layout>

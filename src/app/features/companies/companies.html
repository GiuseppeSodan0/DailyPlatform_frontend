<app-layout>
  <div class="flex items-center justify-between">
    <h2 class="text-2xl font-semibold text-gray-800">Aziende</h2>
    <button *appHasPermission="'PAGE_COMPANY_CREATE'" (click)="openCreate()"
      class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg px-4 py-2.5 transition-colors">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuova azienda
    </button>
  </div>

  <div class="mt-6 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-100 bg-gray-50">
            <th class="text-left px-6 py-3 font-medium text-gray-500">Ragione sociale</th>
            <th class="text-left px-6 py-3 font-medium text-gray-500">Email</th>
            <th class="text-left px-6 py-3 font-medium text-gray-500">Comune</th>
            <th class="text-left px-6 py-3 font-medium text-gray-500">P.IVA</th>
            <th class="text-left px-6 py-3 font-medium text-gray-500">Stato</th>
            <th class="text-right px-6 py-3 font-medium text-gray-500">Azioni</th>
          </tr>
        </thead>
        <tbody>
          @for (company of companies(); track company.id) {
            <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 font-medium text-gray-900">{{ company.factoryName || '-' }}</td>
              <td class="px-6 py-4 text-gray-600">{{ company.email || '-' }}</td>
              <td class="px-6 py-4 text-gray-600">{{ company.comune || '-' }}</td>
              <td class="px-6 py-4 text-gray-600">{{ company.partitaIva || '-' }}</td>
              <td class="px-6 py-4">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                  [class.bg-green-50]="isActive(company.status)"
                  [class.text-green-700]="isActive(company.status)"
                  [class.bg-yellow-50]="!isActive(company.status)"
                  [class.text-yellow-700]="!isActive(company.status)"
                >{{ company.status }}</span>
              </td>
              <td class="px-6 py-4 text-right">
                <div class="flex items-center justify-end gap-1">
                  <button *appHasPermission="'PAGE_COMPANY_EDIT'" (click)="openEdit(company)"
                    class="p-2 rounded-lg text-gray-400 hover:text-blue-600 hover:bg-blue-50 transition-colors" title="Modifica">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </button>
                  <button *appHasPermission="'PAGE_COMPANY_DELETE'" (click)="confirmDelete(company)"
                    class="p-2 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors" title="Elimina">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                  </button>
                </div>
              </td>
            </tr>
          } @empty {
            <tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">Nessuna azienda trovata</td></tr>
          }
        </tbody>
      </table>
    </div>
  </div>

  <app-modal-wrapper [open]="modalMode === 'create' || modalMode === 'edit'" [title]="modalMode === 'create' ? 'Nuova azienda' : 'Modifica azienda'" (close)="closeModal()">
    <form [formGroup]="form" (ngSubmit)="saveCompany()">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Ragione sociale</label><input formControlName="factoryName" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" formControlName="email" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">PEC</label><input type="email" formControlName="pec" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Telefono</label><input formControlName="telefono" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Partita IVA</label><input type="number" formControlName="partitaIva" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Codice Fiscale</label><input formControlName="codiceFiscale" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Codice Univoco</label><input formControlName="codiceUnivoco" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Responsabile</label><input formControlName="responsabile" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">CAP</label><input formControlName="cap" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Comune</label><input formControlName="comune" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Provincia</label><input formControlName="provincia" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Regione</label><input formControlName="regione" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Nazione</label><input formControlName="nazione" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Codice ATECO</label><input formControlName="codiceAteco" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">N. Dipendenti</label><input type="number" formControlName="numDipendenti" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">UID</label><input formControlName="uid" readonly class="w-full rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-gray-500 cursor-not-allowed" /></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">UUID</label><input formControlName="uuid" readonly class="w-full rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-gray-500 cursor-not-allowed" /></div>
        <div class="sm:col-span-2 lg:col-span-3"><label class="block text-sm font-medium text-gray-700 mb-1">Note</label><textarea formControlName="note" rows="2" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"></textarea></div>
      </div>
      <div class="flex justify-end gap-3 pt-4 mt-4 border-t border-gray-100">
        <button type="button" (click)="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Annulla</button>
        <button type="submit" [disabled]="saving()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 rounded-lg transition-colors">{{ saving() ? 'Salvataggio...' : 'Salva' }}</button>
      </div>
    </form>
  </app-modal-wrapper>

  <app-confirm-modal
    [open]="!!deleteTarget"
    title="Elimina azienda"
    [message]="'Eliminare ' + deleteTarget?.factoryName + '?'"
    confirmText="Elimina"
    cancelText="Annulla"
    [danger]="true"
    (confirm)="executeDelete()"
    (cancel)="deleteTarget = null"
  />
</app-layout>
